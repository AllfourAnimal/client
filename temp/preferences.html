<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>All4Animal - 나에게 꼭 맞는 가족 찾기</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#f7f9ff",
                        "on-background": "#091d2e",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#004e5b",
                        "surface-container-highest": "#d1e4fb",
                        "on-surface-variant": "#534439",
                        "primary-fixed": "#ffdcc4",
                        "on-error": "#ffffff",
                        "surface-container-high": "#d9eaff",
                        "on-surface": "#091d2e",
                        "inverse-on-surface": "#e8f2ff",
                        "surface-variant": "#d1e4fb",
                        "on-secondary-fixed-variant": "#5f4027",
                        "error-container": "#ffdad6",
                        "outline-variant": "#d8c2b5",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#6f3800",
                        "primary-fixed-dim": "#ffb780",
                        "on-secondary-fixed": "#2d1603",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#6f3800",
                        "on-error-container": "#93000a",
                        "surface-dim": "#c9dcf3",
                        "on-tertiary-fixed-variant": "#004e5b",
                        "inverse-surface": "#203243",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#ffdcc4",
                        "tertiary": "#006878",
                        "background": "#f7f9ff",
                        "outline": "#867468",
                        "tertiary-fixed": "#a8edff",
                        "surface": "#f7f9ff",
                        "on-primary-fixed": "#2f1400",
                        "tertiary-fixed-dim": "#72d4ea",
                        "secondary-fixed-dim": "#ebbd9d",
                        "primary-container": "#f4a261",
                        "primary": "#8e4e14",
                        "surface-tint": "#8e4e14",
                        "surface-container-low": "#edf4ff",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#fdcead",
                        "on-secondary-container": "#79563c",
                        "inverse-primary": "#ffb780",
                        "tertiary-container": "#5fc2d8",
                        "on-tertiary-fixed": "#001f25",
                        "secondary": "#7a573d",
                        "surface-container": "#e3efff"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-nav { backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        .asymmetric-shape { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
    </style>
</head>
<body class="bg-surface-bright text-on-background selection:bg-primary-container selection:text-on-primary-container">
<main class="pt-32 pb-24 px-6">
<div class="max-w-4xl mx-auto">
<!-- Hero Header -->
<header class="text-center mb-16 relative">
<div class="absolute -top-12 -left-12 w-64 h-64 bg-primary-fixed opacity-20 asymmetric-shape blur-3xl z-0"></div>
<div class="relative z-10">
<h1 class="text-5xl md:text-[3.5rem] font-extrabold tracking-tight text-on-background mb-6 leading-tight">
                        나에게 꼭 맞는 <span class="text-primary">가족 찾기</span>
</h1>
<p class="text-xl text-on-surface-variant max-w-2xl mx-auto leading-relaxed font-medium">
                        당신이 선호하는 반려동물의 특징을 알려주세요. <br class="hidden md:block"/> 정교한 알고리즘을 통해 최고의 인연을 추천해 드립니다.
                    </p>
</div>
</header>
<!-- Survey Form -->
<form class="space-y-12">
<!-- Section 1: 동물 종류 -->
<section>
<div class="flex items-center gap-3 mb-6">
<span class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-sm">1</span>
<h2 class="text-2xl font-bold">동물 종류 <span class="text-primary text-sm font-normal ml-2">(필수)</span></h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<label class="group relative flex flex-col p-6 rounded-[1.5rem] bg-surface-container-low cursor-pointer transition-all hover:bg-surface-container hover:-translate-y-1 ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input checked="" class="sr-only" name="animal_type" type="radio"/>
<span class="material-symbols-outlined text-4xl mb-4 text-primary group-has-[:checked]:fill-1">potted_plant</span>
<span class="text-lg font-bold">강아지</span>
<span class="text-sm text-on-surface-variant mt-1">충성스럽고 활기찬 친구</span>
</label>
<label class="group relative flex flex-col p-6 rounded-[1.5rem] bg-surface-container-low cursor-pointer transition-all hover:bg-surface-container hover:-translate-y-1 ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input class="sr-only" name="animal_type" type="radio"/>
<span class="material-symbols-outlined text-4xl mb-4 text-primary">pets</span>
<span class="text-lg font-bold">고양이</span>
<span class="text-sm text-on-surface-variant mt-1">우아하고 독립적인 친구</span>
</label>
<label class="group relative flex flex-col p-6 rounded-[1.5rem] bg-surface-container-low cursor-pointer transition-all hover:bg-surface-container hover:-translate-y-1 ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input class="sr-only" name="animal_type" type="radio"/>
<span class="material-symbols-outlined text-4xl mb-4 text-primary">all_inclusive</span>
<span class="text-lg font-bold">상관없음</span>
<span class="text-sm text-on-surface-variant mt-1">모든 동물을 사랑해요</span>
</label>
</div>
</section>
<!-- Section 2: 동물 크기 -->
<section>
<div class="flex items-center gap-3 mb-6">
<span class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-sm">2</span>
<h2 class="text-2xl font-bold">동물 크기 <span class="text-primary text-sm font-normal ml-2">(필수)</span></h2>
</div>
<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
<label class="flex items-center justify-center p-4 rounded-xl bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input checked="" class="sr-only" name="size" type="radio"/>
<span class="font-bold">소형</span>
</label>
<label class="flex items-center justify-center p-4 rounded-xl bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input class="sr-only" name="size" type="radio"/>
<span class="font-bold">중형</span>
</label>
<label class="flex items-center justify-center p-4 rounded-xl bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input class="sr-only" name="size" type="radio"/>
<span class="font-bold">대형</span>
</label>
<label class="flex items-center justify-center p-4 rounded-xl bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input class="sr-only" name="size" type="radio"/>
<span class="font-bold">상관없음</span>
</label>
</div>
</section>
<!-- Section 3 & 4: Two Column Layout -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-12">
<!-- Section 3: 성별 -->
<section>
<div class="flex items-center gap-3 mb-6">
<span class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-sm">3</span>
<h2 class="text-2xl font-bold">동물 성별</h2>
</div>
<div class="flex flex-col gap-3">
<label class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low cursor-pointer ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input checked="" class="sr-only" name="gender" type="radio"/>
<span class="material-symbols-outlined text-blue-500">male</span>
<span class="font-bold">수컷</span>
</label>
<label class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low cursor-pointer ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input class="sr-only" name="gender" type="radio"/>
<span class="material-symbols-outlined text-rose-400">female</span>
<span class="font-bold">암컷</span>
</label>
<label class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low cursor-pointer ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input class="sr-only" name="gender" type="radio"/>
<span class="material-symbols-outlined text-on-surface-variant">balance</span>
<span class="font-bold">상관없음</span>
</label>
</div>
</section>
<!-- Section 4: 나이 -->
<section>
<div class="flex items-center gap-3 mb-6">
<span class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-sm">4</span>
<h2 class="text-2xl font-bold">동물 나이</h2>
</div>
<div class="flex flex-col gap-3">
<label class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low cursor-pointer ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input checked="" class="sr-only" name="age" type="radio"/>
<span class="material-symbols-outlined text-primary">child_care</span>
<span class="font-bold">어린 개체</span>
</label>
<label class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low cursor-pointer ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input class="sr-only" name="age" type="radio"/>
<span class="material-symbols-outlined text-primary">pets</span>
<span class="font-bold">성체</span>
</label>
<label class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low cursor-pointer ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input class="sr-only" name="age" type="radio"/>
<span class="material-symbols-outlined text-primary">elderly_woman</span>
<span class="font-bold">노령 개체</span>
</label>
<label class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low cursor-pointer ring-2 ring-transparent has-[:checked]:ring-primary has-[:checked]:bg-surface-container-lowest">
<input class="sr-only" name="age" type="radio"/>
<span class="material-symbols-outlined text-primary">all_inclusive</span>
<span class="font-bold">상관없음</span>
</label>
</div>
</section>
</div>
<!-- Section 5: 동물 성격 -->
<section class="bg-surface-container-low p-8 rounded-[2rem] border border-outline-variant/10">
<div class="flex items-center gap-3 mb-6">
<span class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-sm">5</span>
<h2 class="text-2xl font-bold">동물 성격 <span class="text-on-surface-variant text-sm font-normal ml-2">(다중 선택 가능)</span></h2>
</div>
<div class="flex flex-wrap gap-3">
<label class="inline-flex items-center px-5 py-2.5 rounded-full bg-surface-container-lowest text-on-surface-variant cursor-pointer transition-all hover:bg-primary-fixed hover:text-on-primary-fixed-variant border border-outline-variant/20 has-[:checked]:bg-primary has-[:checked]:text-on-primary has-[:checked]:border-primary">
<input class="sr-only" type="checkbox"/>
<span class="font-medium text-sm">사람을 좋아함</span>
</label>
<label class="inline-flex items-center px-5 py-2.5 rounded-full bg-surface-container-lowest text-on-surface-variant cursor-pointer transition-all hover:bg-primary-fixed hover:text-on-primary-fixed-variant border border-outline-variant/20 has-[:checked]:bg-primary has-[:checked]:text-on-primary has-[:checked]:border-primary">
<input class="sr-only" type="checkbox"/>
<span class="font-medium text-sm">밝고 활기참</span>
</label>
<label class="inline-flex items-center px-5 py-2.5 rounded-full bg-surface-container-lowest text-on-surface-variant cursor-pointer transition-all hover:bg-primary-fixed hover:text-on-primary-fixed-variant border border-outline-variant/20 has-[:checked]:bg-primary has-[:checked]:text-on-primary has-[:checked]:border-primary">
<input class="sr-only" type="checkbox"/>
<span class="font-medium text-sm">차분하고 편안함</span>
</label>
<label class="inline-flex items-center px-5 py-2.5 rounded-full bg-surface-container-lowest text-on-surface-variant cursor-pointer transition-all hover:bg-primary-fixed hover:text-on-primary-fixed-variant border border-outline-variant/20 has-[:checked]:bg-primary has-[:checked]:text-on-primary has-[:checked]:border-primary">
<input class="sr-only" type="checkbox"/>
<span class="font-medium text-sm">새로운 환경에 잘 적응</span>
</label>
<label class="inline-flex items-center px-5 py-2.5 rounded-full bg-surface-container-lowest text-on-surface-variant cursor-pointer transition-all hover:bg-primary-fixed hover:text-on-primary-fixed-variant border border-outline-variant/20 has-[:checked]:bg-primary has-[:checked]:text-on-primary has-[:checked]:border-primary">
<input class="sr-only" type="checkbox"/>
<span class="font-medium text-sm">산책과 활동을 좋아함</span>
</label>
<label class="inline-flex items-center px-5 py-2.5 rounded-full bg-surface-container-lowest text-on-surface-variant cursor-pointer transition-all hover:bg-primary-fixed hover:text-on-primary-fixed-variant border border-outline-variant/20 has-[:checked]:bg-primary has-[:checked]:text-on-primary has-[:checked]:border-primary">
<input class="sr-only" type="checkbox"/>
<span class="font-medium text-sm">다른 동물과 잘 지냄</span>
</label>
<label class="inline-flex items-center px-5 py-2.5 rounded-full bg-surface-container-lowest text-on-surface-variant cursor-pointer transition-all hover:bg-primary-fixed hover:text-on-primary-fixed-variant border border-outline-variant/20 has-[:checked]:bg-primary has-[:checked]:text-on-primary has-[:checked]:border-primary">
<input class="sr-only" type="checkbox"/>
<span class="font-medium text-sm">반려동물 경험이 없는 보호자도 함께할 수 있음</span>
</label>
<label class="inline-flex items-center px-5 py-2.5 rounded-full bg-surface-container-lowest text-on-surface-variant cursor-pointer transition-all hover:bg-primary-fixed hover:text-on-primary-fixed-variant border border-outline-variant/20 has-[:checked]:bg-primary has-[:checked]:text-on-primary has-[:checked]:border-primary">
<input class="sr-only" type="checkbox"/>
<span class="font-medium text-sm">가족과 함께 지내기 좋음</span>
</label>
<label class="inline-flex items-center px-5 py-2.5 rounded-full bg-surface-container-lowest text-on-surface-variant cursor-pointer transition-all hover:bg-primary-fixed hover:text-on-primary-fixed-variant border border-outline-variant/20 has-[:checked]:bg-primary has-[:checked]:text-on-primary has-[:checked]:border-primary">
<input class="sr-only" type="checkbox"/>
<span class="font-medium text-sm">기다려주면 다가옴</span>
</label>
</div>
</section>
<!-- Submit Button -->
<div class="pt-8 text-center">
<button class="inline-flex items-center justify-center px-12 py-6 rounded-full bg-primary text-on-primary text-xl font-extrabold shadow-xl hover:scale-105 active:scale-95 transition-all duration-300 gap-3 group" type="submit">
<span>설문 완료하기</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<p class="mt-6 text-on-surface-variant text-sm font-medium">데이터 분석을 위해 약 10초 정도 소요될 수 있습니다.</p>
</div>
</form>
</div>
</main>
</body></html>
