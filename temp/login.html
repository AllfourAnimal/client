<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }

    opacity: 0.03
    }</style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="absolute inset-0 grain-overlay pointer-events-none"></div>
<div class="layout-container flex h-full grow flex-col items-center justify-center p-6 sm:p-6">
<div class="w-full max-w-[480px] flex flex-col gap-4">
<!-- Home Navigation -->
<div class="flex items-center">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors duration-200" onclick="window.location.href='home.html'">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
<span class="text-sm font-semibold uppercase tracking-wider">홈으로</span>
</button>
</div>
<!-- Main Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 sm:p-12 shadow-[0_8px_32px_rgba(9,29,46,0.04)] border border-outline-variant/15 flex flex-col gap-8">
<!-- Brand/Header Area -->
<div class="flex flex-col items-center text-center gap-4">
<div class="size-14 bg-gradient-to-br from-primary to-primary-container rounded-2xl flex items-center justify-center text-white shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1;">pets</span>
</div>
<div class="flex flex-col gap-2">
<h1 class="text-on-surface font-headline text-3xl font-extrabold tracking-tight">환영합니다!</h1>
<p class="text-on-surface-variant text-base leading-relaxed max-w-[280px] mx-auto">
                                All4Animal에 로그인하여<br>인생의 동반자를 만나보세요.
                            </p>
</div>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6" onsubmit="return false;">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-on-surface/80 ml-1">이메일 주소</label>
<input class="w-full rounded-lg bg-surface-container-low border-none focus:ring-2 focus:ring-primary-fixed focus:bg-surface-bright h-14 px-5 text-on-surface placeholder:text-outline transition-all duration-300" placeholder="name@company.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-semibold text-on-surface/80">비밀번호</label>
<a class="text-xs font-bold text-primary hover:text-primary-container transition-colors uppercase tracking-tight" href="#">비밀번호를 잊으셨나요?</a>
</div>
<input class="w-full rounded-lg bg-surface-container-low border-none focus:ring-2 focus:ring-primary-fixed focus:bg-surface-bright h-14 px-5 text-on-surface placeholder:text-outline transition-all duration-300" placeholder="••••••••" type="password"/>
</div>
<div class="flex flex-col gap-4 mt-2">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-bold h-14 rounded-full transition-all duration-300 transform active:scale-[0.98] shadow-md shadow-primary/10" onclick="window.location.href='preferences.html'">
                                로그인
                            </button>
<div class="flex items-center justify-center gap-2 py-2">
<span class="text-on-surface-variant text-sm">처음이신가요?</span>
<a class="text-primary font-bold text-sm hover:underline underline-offset-4 decoration-2" href="#">계성 생성</a>
</div>
</div>
</form>
</div>
<!-- Footer Aesthetic -->
<div class="flex justify-center items-center gap-6 text-outline">
<span class="text-[10px] font-bold uppercase tracking-[0.2em]">© 2024 DesignTool</span>
<div class="size-1 rounded-full bg-outline-variant/50"></div>
<a class="text-[10px] font-bold uppercase tracking-[0.2em] hover:text-on-surface transition-colors" href="#">Privacy</a>
<div class="size-1 rounded-full bg-outline-variant/50"></div>
<a class="text-[10px] font-bold uppercase tracking-[0.2em] hover:text-on-surface transition-colors" href="#">Support</a>
</div>
